<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — Clarity</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body class="auth-body">

    <div class="auth-container">

        <!-- Logo -->
        <a href="/" class="auth-logo">Clarity</a>

        <!-- Heading -->
        <h1 class="auth-heading">Create your account.</h1>
        <p class="auth-subtext">Start tracking smarter today.</p>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <p class="auth-error">{{ message }}</p>
            {% endfor %}
        {% endwith %}

        <!-- Form -->
        <form class="auth-form" method="POST" action="/register">

            <!-- Full Name -->
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input
                    type="text"
                    class="form-input"
                    placeholder="John Doe"
                    name="name"
                    required
                >
            </div>

            <!-- Email -->
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input
                    type="email"
                    class="form-input"
                    placeholder="john@email.com"
                    name="email"
                    required
                >
            </div>

            <!-- Password -->
            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-wrapper">
                    <input
                        type="password"
                        class="form-input"
                        placeholder="Min. 8 characters"
                        name="password"
                        id="password"
                        required
                    >
                    <span class="toggle-password"
                    onclick="togglePassword('password')">
                        <i class="fa-solid fa-eye"
                        id="password-icon"></i>
                    </span>
                </div>
            </div>

            <!-- Confirm Password -->
            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <div class="input-wrapper">
                    <input
                        type="password"
                        class="form-input"
                        placeholder="Repeat your password"
                        name="confirm_password"
                        id="confirm-password"
                        required
                    >
                    <span class="toggle-password"
                    onclick="togglePassword('confirm-password')">
                        <i class="fa-solid fa-eye"
                        id="confirm-password-icon"></i>
                    </span>
                </div>
            </div>

            <!-- Role -->
            <div class="form-group">
                <label class="form-label">Your Role</label>
                <select 
                    name="role" 
                    class="form-input form-select-custom"
                    required
                >
                    <option value="" disabled selected>
                        Select your role
                    </option>
                    <option value="Student">Student</option>
                    <option value="Head of Family">
                        Head of Family
                    </option>
                    <option value="Daily Wager">Daily Wager</option>
                    <option value="Salaried Employee">
                        Salaried Employee
                    </option>
                    <option value="Business Owner">
                        Business Owner
                    </option>
                </select>
            </div>

            <!-- Submit -->
            <button type="submit" class="auth-btn">
                Create Account
            </button>

        </form>

        <!-- Login Link -->
        <p class="auth-switch">
            Already have an account?
            <a href="/login">Login</a>
        </p>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>

</body>
</html>
